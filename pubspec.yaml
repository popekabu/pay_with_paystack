name: pay_with_paystack
description: A Flutter plugin for Paystack payments via WebView. Supports card, mobile money, bank transfer, USSD, QR, EFT, split payments, custom fields, and a customisable checkout UI.
version: 1.6.0
homepage: https://dankabuasare.web.app
repository: https://github.com/popekabu/pay_with_paystack
issue_tracker: https://github.com/popekabu/pay_with_paystack/issues

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.2
  uuid: ^4.4.0
  webview_flutter: ^4.4.2
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
